<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flappy Bird</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="game-shell">
    <h1>Flappy Bird</h1>
    <canvas id="gameCanvas" width="480" height="640"></canvas>
    <div class="hud">
      <span id="score">Score: 0</span>
      <span id="message">Press Space or Click to Start</span>
    </div>
  </div>

  <div id="gameOverModal" class="modal hidden">
    <div class="modal-content">
      <h2>Game Over!</h2>
      <div class="score-display">
        <p class="score-label">Final Score</p>
        <p id="finalScore" class="score-number">0</p>
      </div>
      <button id="restartBtn" class="restart-btn">Play Again</button>
      <p class="restart-hint">or press <strong>SPACE</strong></p>
    </div>
  </div>

  <div id="modalOverlay" class="modal-overlay hidden"></div>

  <script src="script.js"></script>
</body>
</html>
